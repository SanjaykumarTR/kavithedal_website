<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="kavithedal.logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kavithedal Publications</title>

    <!-- Preconnect for faster resource loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="dns-prefetch" href="https://sdk.cashfree.com">

    <!-- Non-render-blocking Google Fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    </noscript>

    <!-- Cashfree JS SDK — loaded deferred, only needed when user initiates payment -->
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <!-- SPA redirect restore: 404.html stores the path here so React Router can navigate to it -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect && redirect !== '/') {
          sessionStorage.removeItem('spa_redirect');
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
