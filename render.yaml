# ─────────────────────────────────────────────────────────────────────────────
# Kavithedal Publications — Render Deployment Blueprint
#
# This file configures all three Render services in one place.
# Docs: https://render.com/docs/blueprint-spec
#
# How to use:
#   1. Push this file to your GitHub repository root.
#   2. In Render dashboard → "New" → "Blueprint" → connect your repo.
#   3. Render will create all services automatically.
#   4. Set the environment variable values marked with "sync: false" in the
#      Render dashboard (those are secrets that must NOT be in this file).
# ─────────────────────────────────────────────────────────────────────────────

databases:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  - name: kavithedal-db
    databaseName: kavithedal_db
    user: kavithedal_user
    plan: free          # Upgrade to starter+ for production persistence
    region: singapore   # Pick the region closest to your users

services:
  # ── Django Backend (Web Service) ───────────────────────────────────────────
  - type: web
    name: kavithedal-web
    runtime: python
    region: singapore
    plan: free           # Upgrade to starter for always-on service
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info"
    healthCheckPath: /health/
    envVars:
      # ── Django ────────────────────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure random value

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        # settings.py auto-appends RENDER_EXTERNAL_HOSTNAME and kavithedal.com.
        # Add your actual Render hostname here after first deploy, e.g.:
        # kavithedal-api.onrender.com,localhost,127.0.0.1
        value: "localhost,127.0.0.1"

      - key: PYTHON_VERSION
        value: "3.13.0"

      # ── Database ──────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: kavithedal-db
          property: connectionString

      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          name: kavithedal-web
          type: web
          property: host

      # ── Email (fill in Render dashboard — never commit real values) ───────
      - key: EMAIL_HOST_USER
        sync: false       # Set in Render dashboard

      - key: EMAIL_HOST_PASSWORD
        sync: false       # Set in Render dashboard

      - key: DEFAULT_FROM_EMAIL
        sync: false       # Set in Render dashboard

      # ── Cashfree Payment Gateway ──────────────────────────────────────────
      # Get credentials from https://merchant.cashfree.com → Developers → API Keys
      - key: CASHFREE_APP_ID
        sync: false       # Set in Render dashboard

      - key: CASHFREE_SECRET_KEY
        sync: false       # Set in Render dashboard

      # 'sandbox' for testing, 'production' for live payments
      - key: CASHFREE_ENV
        value: "production"

      # Frontend URL — used to build Cashfree return_url after payment.
      # Points to the production custom domain.
      - key: FRONTEND_URL
        value: "https://www.kavithedalpublication.store"

      # ── Admin Access ──────────────────────────────────────────────────────
      - key: ADMIN_EMAIL
        sync: false       # Set in Render dashboard — the OTP-protected admin email

      # ── CORS ─────────────────────────────────────────────────────────────
      # All origins that are allowed to call the API.
      # Includes the custom domain (with/without www) + Render fallback URL.
      - key: CORS_ALLOWED_ORIGINS
        value: "https://www.kavithedalpublication.store,https://kavithedalpublication.store,https://kavithedal-frontend-sgki.onrender.com"

      # ── Cloudinary (persistent media — book covers, PDFs, author photos) ──
      - key: CLOUDINARY_CLOUD_NAME
        sync: false       # Set in Render dashboard — get from cloudinary.com/console

      - key: CLOUDINARY_API_KEY
        sync: false       # Set in Render dashboard

      - key: CLOUDINARY_API_SECRET
        sync: false       # Set in Render dashboard

  # ── React Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: kavithedal-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    # SPA routing — all paths serve index.html so React Router handles them
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: "/*"
        name: Cache-Control
        value: "no-cache"         # Let the browser always check for updates
      - path: "/assets/*"
        name: Cache-Control
        value: "public, max-age=31536000, immutable"  # Hashed assets cached 1 year
    envVars:
      # Pre-filled with the default Render URL for kavithedal-web.
      # Vite bakes this into the build — update if you rename the service or use a custom domain.
      - key: VITE_API_URL
        value: "https://kavithedal-web.onrender.com"

      # Cashfree SDK mode — must match CASHFREE_ENV in backend
      # 'sandbox' for testing, 'production' for live payments
      - key: VITE_CASHFREE_ENV
        value: "production"
